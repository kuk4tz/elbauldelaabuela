<!DOCTYPE html>
<html lang="es">

<!-- ================================================================
  ARCHIVO: caballero-elegante.html
  PÁGINA:  Detalle estilo Caballero Elegante – El Baúl de la Abuela
  ESTILOS: styles.css (sección 39 "GALERÍA DE ESTILO")

  ESTRUCTURA:
  ┌──────────────────────────────────────────────────────┐
  │ <header>  Navbar                                     │
  ├──────────────────────────────────────────────────────┤
  │ <section.galeria-trajes>                             │
  │   Flecha volver → hombres-trajes.html                │
  │   H1 "Caballero elegante"                            │
  │                                                      │
  │   MÓVIL:                                             │
  │     .galeria-hero → 1 placeholder ancho (16:9)       │
  │     .galeria-grid → 2 columnas, 10 items             │
  │                     texto chico bajo cada imagen     │
  │                                                      │
  │   DESKTOP:                                           │
  │     .galeria-grid → 5 columnas × 2 filas = 10 items  │
  │                     texto chico bajo cada imagen     │
  └──────────────────────────────────────────────────────┘

  AGREGAR IMÁGENES:
    Hero (móvil):
      Reemplaza <div class="galeria-hero__ph"> por:
      <img class="galeria-hero__img"
           src="imagenes/caballero-hero.jpg" alt="Caballero" />
    Grid items:
      Reemplaza cada <div class="galeria-item__ph"> por:
      <img class="galeria-item__img"
           src="imagenes/caballero-XX.jpg" alt="Traje X" />
================================================================ -->

<head>

  <link href="https://fonts.googleapis.com/css2?family=Lusitana:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />

</head>

<body>

  <!-- NAVBAR -->

          <img src="imagenes/logos/completo.png" alt="El Baúl de la Abuela" />
        </div>
      </a>
      <ul class="navbar__nav" role="list">
        <li><a class="navbar__nav-link" href="arriendo-trajes.html" aria-current="page">Arriendo de trajes</a></li>
        <li><a class="navbar__nav-link" href="sesiones.html">Sesiones</a></li>
        <li><a class="navbar__nav-link" href="vamos-a-tu-evento.html">Vamos a tu evento</a></li>
        <li><a class="navbar__nav-link" href="contactanos.html">Contáctanos</a></li>
      </ul>
      <button class="navbar__hamburger" id="hamburgerBtn" aria-label="Abrir menú" aria-expanded="false" aria-controls="mobileMenu">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar__mobile-menu" id="mobileMenu" role="list" aria-hidden="true">
        <li><a class="navbar__mobile-link" href="arriendo-trajes.html" aria-current="page">Arriendo de trajes</a></li>
        <li><a class="navbar__mobile-link" href="sesiones.html">Sesiones</a></li>
        <li><a class="navbar__mobile-link" href="vamos-a-tu-evento.html">Vamos a tu evento</a></li>
        <li><a class="navbar__mobile-link" href="contactanos.html">Contacto</a></li>

    </nav>
  </header>

        <!-- Flecha volver → hombres-trajes.html -->
        <a href="hombres-trajes.html" class="trajes-back-btn" aria-label="Volver a trajes de hombre">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

        <h1 class="galeria-trajes__titulo">Caballero elegante</h1>

        <!-- ============================================================
          HERO — solo visible en móvil
        ============================================================ -->

        <!-- ============================================================
          GRID DE FOTOS
          Desktop: 5 columnas × 2 filas (10 items).
          Móvil:   2 columnas × 5 filas (10 items).
        ============================================================ -->
        <div class="galeria-grid">

          <!-- Fila 1 — Trajes (items 1–5) -->
          <a href="#" class="galeria-item" aria-label="Traje 1">

          <a href="#" class="galeria-item" aria-label="Traje 2">
            <div class="galeria-item__ph" aria-hidden="true">
              <img src="imagenes/peakyBlinders/P-02.png" alt="Caballero Elegante 2" />
            </div>
            <span class="galeria-item__texto">Caballero elegante 02</span>
          </a>
          <a href="#" class="galeria-item" aria-label="Traje 3">
            <div class="galeria-item__ph" aria-hidden="true">
              <img src="imagenes/peakyBlinders/P-03.png" alt="Caballero Elegante 3" />
            </div>
            <span class="galeria-item__texto">Caballero elegante 03 </span>
          </a>
          <a href="#" class="galeria-item" aria-label="Traje 4">

              <img src="imagenes/peakyBlinders/P-04.png" alt="Caballero Elegante 4" />

          <a href="#" class="galeria-item" aria-label="Traje 5">
            <div class="galeria-item__ph" aria-hidden="true">

            </div>
            <span class="galeria-item__texto">Caballero elegante 05</span>
          </a>

          <!-- Fila 2 — Accesorios (items 6–10) -->
          <a href="#" class="galeria-item" aria-label="Accesorio 1">
            <div class="galeria-item__ph" aria-hidden="true">
              <img src="imagenes/peakyBlinders/P-06.png" alt="Caballero Elegante 6" />
            </div>
            <span class="galeria-item__texto">Caballero elegante 06</span>
          </a>
          

        </div><!-- /.galeria-grid -->

      </div><!-- /.galeria-trajes__inner -->
    </section>

  </main>


  <!-- FOOTER SIMPLE -->
  <footer class="site-footer-simple" role="contentinfo" aria-label="El Baúl de la Abuela">
    <div class="site-footer-simple__logo">
      <img src="imagenes/logo.nombre.png" alt="El Baúl de la Abuela" />
    </div>
  </footer>

  <script>
    'use strict';
    (function () {
      var btn  = document.getElementById('hamburgerBtn');
      var menu = document.getElementById('mobileMenu');
      function open()  { menu.classList.add('is-open');    btn.classList.add('is-open');    btn.setAttribute('aria-expanded','true');  menu.setAttribute('aria-hidden','false'); btn.setAttribute('aria-label','Cerrar menú'); }
      function close() { menu.classList.remove('is-open'); btn.classList.remove('is-open'); btn.setAttribute('aria-expanded','false'); menu.setAttribute('aria-hidden','true');  btn.setAttribute('aria-label','Abrir menú'); }
      btn.addEventListener('click', function () { menu.classList.contains('is-open') ? close() : open(); });
      document.addEventListener('click', function (e) { if (!btn.contains(e.target) && !menu.contains(e.target)) close(); });
      menu.querySelectorAll('.navbar__mobile-link').forEach(function (l) { l.addEventListener('click', close); });
    }());
  </script>

</body>
</html>
