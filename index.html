  PÁGINA:  Home – El Baúl de la Abuela
  ESTILOS: styles.css  (mismo directorio)

  │ <header>  Navbar (logo + links)         │

  <main>

    <!-- ============================================================
      SECCIÓN HERO — CARRUSEL DE 7 IMÁGENES
      ────────────────────────────────────────────────────────────
      Origen Figma: zona superior crema en ambos prototipos.
        • Fondo crema (#E8D9C4) — variable --color-bg-hero en styles.css
        • 7 slides: el central es grande y al 100% de opacidad;
          los laterales son más pequeños y con ~55% de opacidad.
        • El carrusel avanza automáticamente de derecha a izquierda.
        • JS controla data-state de cada slide; CSS aplica el estilo.

      Clases CSS → styles.css, sección "CARRUSEL":
        .hero                  → sección completa (fondo crema)
        .carousel-wrapper      → ancho máximo centrado
        .carousel              → ventana visible del carrusel
        .carousel__btn         → botones ← →
        .carousel__btn--prev   → botón izquierdo
        .carousel__btn--next   → botón derecho
        .carousel__track       → contenedor de todos los slides
        .carousel__slide       → cada tarjeta de imagen
          [data-state="active"]       → slide central grande
          [data-state="prev"]         → slide izquierdo pequeño
          [data-state="next"]         → slide derecho pequeño
          [data-state="hidden-left"]  → oculto fuera por izquierda
          [data-state="hidden-right"] → oculto fuera por derecha
        .carousel__img              → imagen real dentro del slide
        .carousel__img-placeholder  → bloque gris (sin imagen aún)
        .carousel__overlay          → degradado en base del slide
        .carousel__overlay-text     → texto sobre la imagen
        .carousel__dots             → fila de puntos indicadores
        .carousel__dot              → cada punto
        .carousel__dot.is-active    → punto activo (más ancho)

      CÓMO AGREGAR IMÁGENES:
        En cada slide, elimina el <div class="carousel__img-placeholder">
        y reemplázalo por:
          <img class="carousel__img"
               src="imagenes/sesion-XX.jpg"
               alt="Descripción de la sesión" />
    ============================================================ -->
    <section class="hero" aria-label="Galería de sesiones fotográficas">

            </svg>
          </button>

          <div class="carousel__track" id="carouselTrack">

            <div class="carousel__slide" data-state="prev" data-index="0" aria-label="Sesión familia">

                <source media="(max-width: 768px)" srcset="imagenes/familia.celu.png" />
                <img class="carousel__img" src="imagenes/familia.compu.png" alt="Sesión Familia" />
              </picture>
            </div>

            <div class="carousel__slide" data-state="active" data-index="1" aria-label="Sesión gift card">
              <picture>
                <source media="(max-width: 768px)" srcset="imagenes/gift.card.celu.png" />
                <img class="carousel__img" src="imagenes/gift.card.compu.png" alt="Gift card" />
              </picture>
            </div>

            <div class="carousel__slide" data-state="next" data-index="2" aria-label="Sesión niños">
              <picture>
                <source media="(max-width: 768px)" srcset="imagenes/niños.celu.png" />
                <img class="carousel__img" src="imagenes/niños.compu.png" alt="Sesión niños" />
              </picture>
            </div>

            <div class="carousel__slide" data-state="hidden-right" data-index="3" aria-label="arriendo">
              <picture>
                <source media="(max-width: 768px)" srcset="imagenes/arriendo.celu.png" />
                <img class="carousel__img" src="imagenes/arriendo.compu.png" alt="Arriendo" />
              </picture>
            </div>

            <div class="carousel__slide" data-state="hidden-right" data-index="4" aria-label="Sesión eventos">
              <picture>
                <source media="(max-width: 768px)" srcset="imagenes/evento.celu.png" />
                <img class="carousel__img" src="imagenes/evento.compu.png" alt="Sesión eventos" />

            </div>

            <div class="carousel__slide" data-state="hidden-right" data-index="5" aria-label="Sesión mascotas">
              <picture>

                <img class="carousel__img" src="imagenes/mascotas.compu.png" alt="Sesión mascotas" />

          </div><!-- /.carousel__track -->

          <!-- Botón: imagen siguiente -->

            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"

        </div><!-- /.carousel -->

        <!-- PUNTOS INDICADORES (dots) ────────────────────────────

        <div class="carousel__dots" id="carouselDots" role="tablist" aria-label="Seleccionar imagen del carrusel"></div>

  <!-- ==============================================================
    JAVASCRIPT — CARRUSEL + MENÚ HAMBURGUESA
    ──────────────────────────────────────────────────────────────
    CARRUSEL:
      - TOTAL = 7 slides, avance automático cada 4500ms
      - Función calcState(): calcula posición de cada slide
        respecto al índice activo (current) usando aritmética modular
      - Función applyStates(): escribe data-state en cada slide;
        el CSS de styles.css interpreta ese atributo para aplicar
        tamaño, posición y opacidad correspondiente
      - Soporta: botones ← →, swipe táctil, teclado ← →,
        pausa en hover, dots clickeables

    HAMBURGUESA:
      - Clic en #hamburgerBtn alterna .is-open en el menú y el botón
      - Clic fuera del menú lo cierra automáticamente
      - Clic en cualquier link del menú lo cierra
  ============================================================== -->
  <script>
    'use strict';

    /* ── CARRUSEL ─────────────────────────────────────────────── */
    (function () {
      const TOTAL = 7;
      const AUTOPLAY_MS = 8000;
      let current = 1;
      let isAnimating = false;

      const slides = Array.from(document.querySelectorAll('.carousel__slide'));
      const dotsContainer = document.getElementById('carouselDots');
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');

      function buildDots() {
        dotsContainer.innerHTML = '';
        for (let i = 0; i < TOTAL; i++) {
          const btn = document.createElement('button');
          btn.className = 'carousel__dot' + (i === current ? ' is-active' : '');
          btn.setAttribute('role', 'tab');
          btn.setAttribute('aria-label', 'Ir a la imagen ' + (i + 1));
          btn.setAttribute('aria-selected', i === current ? 'true' : 'false');
          btn.dataset.index = i;
          btn.addEventListener('click', () => goTo(i));
          dotsContainer.appendChild(btn);
        }
      }

      function updateDots() {
        dotsContainer.querySelectorAll('.carousel__dot').forEach((d, i) => {
          const active = (i === current);
          d.classList.toggle('is-active', active);
          d.setAttribute('aria-selected', active ? 'true' : 'false');
        });
      }

      function calcState(slideIndex) {
        const diff = ((slideIndex - current) % TOTAL + TOTAL) % TOTAL;
        if (diff === 0) return 'active';
        if (diff === 1) return 'next';
        if (diff === TOTAL - 1) return 'prev';
        if (diff <= Math.floor(TOTAL / 2)) return 'hidden-right';
        return 'hidden-left';
      }

      function applyStates() {
        slides.forEach((slide, i) => {
          slide.dataset.state = calcState(i);
          slide.setAttribute('aria-hidden', slide.dataset.state !== 'active' ? 'true' : 'false');
          slide.setAttribute('tabindex', slide.dataset.state === 'active' ? '0' : '-1');
        });
        updateDots();
      }

      function move(direction) {
        if (isAnimating) return;
        isAnimating = true;
        current = ((current + direction) % TOTAL + TOTAL) % TOTAL;
        applyStates();
        setTimeout(() => { isAnimating = false; }, 400);
      }

      function goTo(index) {
        if (index === current || isAnimating) return;
        isAnimating = true;
        current = index;
        applyStates();
        setTimeout(() => { isAnimating = false; }, 400);
      }

      let autoplayTimer = setInterval(() => move(1), AUTOPLAY_MS);

      function resetAutoplay() {
        clearInterval(autoplayTimer);
        autoplayTimer = setInterval(() => move(1), AUTOPLAY_MS);
      }

      btnNext.addEventListener('click', () => { move(1); resetAutoplay(); });
      btnPrev.addEventListener('click', () => { move(-1); resetAutoplay(); });

      let touchStartX = 0;
      const track = document.getElementById('carouselTrack');

      track.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });

      track.addEventListener('touchend', (e) => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) { move(diff > 0 ? 1 : -1); resetAutoplay(); }
      }, { passive: true });

      document.getElementById('carousel').addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { move(1); resetAutoplay(); }
        if (e.key === 'ArrowLeft') { move(-1); resetAutoplay(); }
      });

      const carouselEl = document.getElementById('carousel');
      carouselEl.addEventListener('mouseenter', () => clearInterval(autoplayTimer));
      carouselEl.addEventListener('mouseleave', () => {
        autoplayTimer = setInterval(() => move(1), AUTOPLAY_MS);
      });

      buildDots();
      applyStates();
    }());


    /* ── HAMBURGUESA ──────────────────────────────────────────── */
    (function () {
      const btn = document.getElementById('hamburgerBtn');
      const menu = document.getElementById('mobileMenu');

      function openMenu() {
        menu.classList.add('is-open');
        btn.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        menu.setAttribute('aria-hidden', 'false');
        btn.setAttribute('aria-label', 'Cerrar menú');
      }

      function closeMenu() {
        menu.classList.remove('is-open');
        btn.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        menu.setAttribute('aria-hidden', 'true');
        btn.setAttribute('aria-label', 'Abrir menú');
      }

      btn.addEventListener('click', () => {
        menu.classList.contains('is-open') ? closeMenu() : openMenu();
      });

      document.addEventListener('click', (e) => {
        if (!btn.contains(e.target) && !menu.contains(e.target)) closeMenu();
      });

      menu.querySelectorAll('.navbar__mobile-link').forEach((link) => {
        link.addEventListener('click', closeMenu);
      });
    }());
  </script>

</body>
